<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crops Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-providers/leaflet-providers.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>

<style>
html,body{margin:0;padding:0;height:100%;font-family:Arial,sans-serif;}

#topbar{
  position:absolute;top:0;left:0;width:100%;z-index:1000;
  background:#fff;padding:10px;text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

#topbar h2{margin:0;font-size:20px;}

#dropdowns{
  margin-top:5px;
  display:flex;gap:8px;justify-content:center;
}

#dropdowns select{padding:5px;}

#map{width:100%;height:100%;}

/* Pink popup */
.leaflet-popup-content-wrapper{
  background:#ffe6ea;
  border-radius:8px;
}
.leaflet-popup-tip{
  background:#ffe6ea;
}

/* Labels */
.label{
  font-weight:bold;
  color:#000;
  text-shadow:1px 1px 2px #fff;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="topbar">
  <h2>Crops Dashboard</h2>
  <div id="dropdowns">
    <select id="cropSelect">
      <option>Local Boro</option>
      <option>Local Bona Aus</option>
      <option>Local Ropa Aman</option>
    </select>

    <select id="metricSelect">
      <option value="Cultivated area (Acres)">Cultivated Area</option>
      <option value="Yield rate (m. ton) per acre">Yield</option>
      <option value="Expenditure per acre in Tk.">Expenditure</option>
      <option value="Price of produced crops per acre (Tk.)">Crop Price</option>
      <option value="Price of by- products per acre (Tk.)">By-product</option>
      <option value="Profit per acre (Tk./acre)">Profit</option>
      <option value="Total production (m. ton)">Production</option>
      <option value="Crop share (m. ton/acre)">Share</option>
    </select>
  </div>
</div>

<div id="map"></div>

<script>
// -------------------------
// Map init
var map = L.map('map', { zoomControl:false }).setView([23.7,90.4],6);

// Zoom inside map
L.control.zoom({position:'bottomleft'}).addTo(map);

// Light basemap
var baseMap = L.tileLayer.provider('CartoDB.Positron').addTo(map);

// Satellite
var satelliteMap = L.tileLayer.provider('Esri.WorldImagery');

// Layer control
L.control.layers(
  {"Light Map": baseMap, "Satellite": satelliteMap},
  null,
  {position:'topright'}
).addTo(map);

// -------------------------
var geojsonLayer, dataIndex={}, labelLayer=L.layerGroup().addTo(map);

var CSV_URL="https://docs.google.com/spreadsheets/d/1lnnKF_oigj3TQl_N9BfIJJwviHktt3LzyW4UDMjHvxQ/gviz/tq?tqx=out:csv&gid=822582774";

// -------------------------
// Load data
Papa.parse(CSV_URL,{
  download:true,header:true,skipEmptyLines:true,
  complete:function(res){
    res.data.forEach(d=>{
      var dist=d.District?.trim().toLowerCase();
      var crop=d['Crops Name'];
      if(!dataIndex[dist]) dataIndex[dist]={};
      dataIndex[dist][crop]=d;
    });
    loadGeo();
  }
});

// -------------------------
function loadGeo(){
  fetch('districts.geojson')
  .then(r=>r.json())
  .then(g=>{
    geojsonLayer=L.geoJSON(g,{
      style:styleDistrict,
      onEachFeature:onEachFeature
    }).addTo(map);

    addLabels(g);
  });
}

// -------------------------
// Smooth color
function getColor(val,arr){
  if(!arr.length) return '#ccc';
  let min=Math.min(...arr), max=Math.max(...arr);
  return chroma.scale(['red','yellow','green']).domain([min,max])(val).hex();
}

// -------------------------
function styleDistrict(f){
  let crop=cropSelect.value;
  let metric=metricSelect.value;
  let dist=f.properties.adm2_name?.trim().toLowerCase();

  let row=dataIndex[dist]?.[crop];
  let vals=Object.values(dataIndex).map(d=>d[crop]?.[metric]).filter(v=>v).map(Number);

  let v=row?Number(row[metric])||0:0;

  return {fillColor:getColor(v,vals),weight:1,color:'#fff',fillOpacity:0.7};
}

// -------------------------
// Popup
function onEachFeature(f,l){
  l.on('click',e=>{
    let crop=cropSelect.value;
    let dist=f.properties.adm2_name?.trim().toLowerCase();
    let row=dataIndex[dist]?.[crop];

    let html=row?`
      <b>${row.District}</b><br><br>
      Area: ${row['Cultivated area (Acres)']} Acre<br>
      Yield: ${row['Yield rate (m. ton) per acre']} ton/acre<br>
      Expenditure: Tk ${row['Expenditure per acre in Tk.']}<br>
      Crop Price: Tk ${row['Price of produced crops per acre (Tk.)']}<br>
      By-product: Tk ${row['Price of by- products per acre (Tk.)']}<br>
      Profit: Tk ${row['Profit per acre (Tk./acre)']}<br>
      Production: ${row['Total production (m. ton)']} ton<br>
      Share: ${row['Crop share (m. ton/acre)']} ton/acre
    `:`<b>${f.properties.adm2_name}</b><br>No data`;

    L.popup().setLatLng(e.latlng).setContent(html).openOn(map);
  });
}

// -------------------------
// Labels
function addLabels(g){
  labelLayer.clearLayers();

  g.features.forEach(f=>{
    let center=getCenter(f.geometry.coordinates);
    let name=f.properties.adm2_name;

    let icon=L.divIcon({
      className:'label',
      html:`<span>${name}</span>`
    });

    L.marker([center[1],center[0]],{icon}).addTo(labelLayer);
  });
}

// centroid
function getCenter(c){
  let x=0,y=0,n=0;
  c[0].forEach(pt=>{x+=pt[0];y+=pt[1];n++;});
  return [x/n,y/n];
}

// scale label
map.on('zoomend',()=>{
  let size=map.getZoom()*2;
  document.querySelectorAll('.label span').forEach(el=>{
    el.style.fontSize=size+'px';
  });
});

// -------------------------
cropSelect.onchange=update;
metricSelect.onchange=update;

function update(){
  geojsonLayer.eachLayer(l=>l.setStyle(styleDistrict(l.feature)));
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crop Dashboard - Bangladesh Districts</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
<style>
  html, body {margin:0; padding:0; height:100%; font-family:"Times New Roman", serif;}
  #map {height: calc(100% - 100px); width: 100%;}
  #header {display:flex; flex-direction:column; align-items:center; padding:4px; background:#fff;}
  #title {font-size:20px; font-weight:bold; margin:2px;}
  #controls {display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:4px;}
  select {font-size:14px; padding:2px 4px;}
  .leaflet-tooltip.my-tooltip {background:rgba(255,255,255,0.9); color:#000; font-size:12px; border-radius:4px; padding:2px 4px;}
</style>
</head>
<body>

<div id="header">
  <div id="title">Bangladesh District Crop Dashboard</div>
  <div id="controls">
    <select id="metricSelect">
      <option value="Cultivated_area">Cultivated area (Acres)</option>
      <option value="Yield_rate">Yield rate (m. ton per acre)</option>
      <option value="Expenditure">Expenditure per acre (Tk.)</option>
      <option value="Price_crop">Price of produced crops per acre (Tk.)</option>
      <option value="Price_byproduct">Price of by-products per acre (Tk.)</option>
      <option value="Profit">Profit per acre (Tk./acre)</option>
      <option value="Total_production">Total production (m. ton)</option>
      <option value="Crop_share">Crop share (m. ton/acre)</option>
    </select>
  </div>
</div>

<div id="map"></div>

<script>
// -----------------------------
// Initialize Leaflet map
// -----------------------------
const map = L.map('map', {
  center: [23.685, 90.3563], // Bangladesh center
  zoom: 7
});

// Base layers
const satellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
  maxZoom: 20,
  subdomains:['mt0','mt1','mt2','mt3'],
  attribution: 'Google Satellite'
}).addTo(map);

const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OpenStreetMap'
});

// Layer control
L.control.layers({Satellite: satellite, Streets: streets}).addTo(map);

// -----------------------------
// Load GeoJSON (replace with your districts file)
// -----------------------------
fetch('./data/districts.geojson')
.then(res => res.json())
.then(geojson => {
  
  // Example crop data (replace with your full dataset)
  const cropData = {
    "Dhaka": {Cultivated_area: 12000, Yield_rate: 2.5, Expenditure: 15000, Price_crop: 25000, Price_byproduct: 2000, Profit: 12000, Total_production: 30000, Crop_share: 2.5},
    "Chittagong": {Cultivated_area: 10000, Yield_rate: 2.2, Expenditure: 14000, Price_crop: 22000, Price_byproduct: 1800, Profit: 10000, Total_production: 22000, Crop_share: 2.2},
    // Add all districts
  };

  let geoLayer;

  function getColor(value, metric){
    // Collect all metric values for percentiles
    const vals = Object.values(cropData).map(d => d[metric]).filter(v=>v!=null);
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const ratio = (value - min) / (max - min);
    // red -> yellow -> green gradient
    return chroma.scale(['red','yellow','green'])(ratio).hex();
  }

  function style(feature, metric){
    const name = feature.properties.adm2_name; // replace field name
    const value = cropData[name]?.[metric] ?? 0;
    return {
      fillColor: getColor(value, metric),
      weight: 1,
      opacity: 1,
      color: 'black',
      dashArray: '1',
      fillOpacity: 0.8
    };
  }

  function onEachFeature(feature, layer){
    const name = feature.properties.adm2_name;
    const value = cropData[name]?.[metricSelect.value] ?? 0;
    layer.bindTooltip(`<strong>${name}</strong><br>${metricSelect.options[metricSelect.selectedIndex].text}: ${value}`, {className:'my-tooltip'});
  }

  function updateMap(){
    if(geoLayer) map.removeLayer(geoLayer);
    geoLayer = L.geoJSON(geojson, {
      style: f => style(f, metricSelect.value),
      onEachFeature: onEachFeature
    }).addTo(map);
    geoLayer.eachLayer(layer => {
      layer.bindTooltip(`<strong>${layer.feature.properties.adm2_name}</strong><br>${metricSelect.options[metricSelect.selectedIndex].text}: ${cropData[layer.feature.properties.adm2_name]?.[metricSelect.value] ?? 0}`, {className:'my-tooltip'});
    });
  }

  const metricSelect = document.getElementById('metricSelect');
  metricSelect.addEventListener('change', updateMap);

  updateMap(); // initial map

});
</script>

</body>
</html>

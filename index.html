<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seasonal Crops Production Expenditure and Profit in Bangladesh</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-providers/leaflet-providers.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html, body {margin:0; padding:0; height:100%; font-family:'Times New Roman', serif;}
#topbar {
  height:10%; display:flex; flex-direction:column; justify-content:center; align-items:center;
  background:rgba(255,255,255,0.95); text-align:center; padding:2px 5px;
}
#topbar h2 {margin:0; font-size:18px; color:red;}
#dropdowns {margin-top:3px; display:flex; justify-content:center; gap:6px;}
#dropdowns select {font-family:'Times New Roman'; font-size:14px; color:blue; padding:3px;}
#mapContainer {height:88%; position:relative;}
#map {width:100%; height:100%;}
#sourceCredit {
  height:2%; display:flex; justify-content:center; align-items:center; font-size:12px; text-align:center;
}
.district-label {font-family:'Times New Roman'; font-size:12.5px; text-align:center; pointer-events:none;}
.legend {position:absolute; bottom:10px; left:10px; background:white; padding:6px; border-radius:4px; font-size:12px; line-height:1.2; box-shadow:0 0 4px rgba(0,0,0,0.3); z-index:1000; max-width:300px;}
.legend-title {font-weight:bold; margin-bottom:4px;}
.legend-item {display:flex; align-items:center; gap:4px; margin-bottom:2px;}
.legend-color {width:15px; height:15px; display:inline-block;}
.north-arrow {position:absolute; top:10px; left:10px; width:40px; height:40px; background:url('https://upload.wikimedia.org/wikipedia/commons/e/e0/North_arrow.svg') no-repeat center center; background-size:contain; z-index:1000;}
</style>
</head>
<body>

<div id="topbar">
  <h2>Seasonal Crops Production Expenditure and Profit in Bangladesh</h2>
  <div id="dropdowns">
    <select id="cropSelect"></select>
    <select id="metricSelect"></select>
  </div>
</div>

<div id="mapContainer">
  <div id="map"></div>
  <div class="north-arrow"></div>
  <div id="legend" class="legend"></div>
</div>

<div id="sourceCredit">
  Data source: <a href="https://objectstorage.ap-dcc-gazipur-1.oraclecloud15.com/n/axvjbnqprylg/b/V2Ministry/o/office-bbs/2024/12/c303b53b29864763ae8cf174fdb57a44.pdf" target="_blank">Agriculture Sample Census-2020</a> | 
  © <a href="https://www.linkedin.com/in/md-sumon-ali-992b91214/" target="_blank">Sumon</a>
</div>

<script>
var map = L.map('map',{zoomControl:true}).setView([23.7,90.4],6);

// Base & Satellite
var baseLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {subdomains:['mt0','mt1','mt2','mt3']}).addTo(map);
var satelliteLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {subdomains:['mt0','mt1','mt2','mt3']});
L.control.layers({"Base Map":baseLayer,"Satellite":satelliteLayer},{},{position:'topright'}).addTo(map);

var geoLayer, dataIndex={}, selectedLayer=null;

const CSV_URL = "https://docs.google.com/spreadsheets/d/1lnnKF_oigj3TQl_N9BfIJJwviHktt3LzyW4UDMjHvxQ/gviz/tq?tqx=out:csv&gid=822582774";
const cropSelect=document.getElementById('cropSelect');
const metricSelect=document.getElementById('metricSelect');

const metrics=[
  "Cultivated area (Acres)",
  "Yield rate (m. ton) per acre",
  "Expenditure per acre in Tk.",
  "Price of produced crops per acre (Tk.)",
  "Price of by- products per acre (Tk.)",
  "Profit per acre (Tk./acre)",
  "Total production (m. ton)",
  "Crop share (m. ton/acre)"
];
metrics.forEach(m=>metricSelect.innerHTML += `<option value="${m}">${m}</option>`);

// Helper: compute color
function getColorScale(value, ranges){
  if(value <= ranges[0]) return '#FF0000';
  else if(value <= ranges[1]) return '#FF4500';
  else if(value <= ranges[2]) return '#FFA500';
  else if(value <= ranges[3]) return '#FFFF00';
  else return '#32CD32';
}

// Load CSV
Papa.parse(CSV_URL,{download:true,header:true,skipEmptyLines:true,complete:function(results){
  results.data.forEach(d=>{
    var district = d.District?.trim().toLowerCase();
    var crop = d['Crops Name'];
    if(!dataIndex[district]) dataIndex[district]={};
    dataIndex[district][crop] = d;
  });
  let crops = [...new Set(results.data.map(d=>d['Crops Name']).filter(Boolean))].sort();
  cropSelect.innerHTML = crops.map(c=>`<option>${c}</option>`).join('');
  loadGeoJSON();
}});

// Load GeoJSON
function loadGeoJSON(){
  fetch('districts.geojson').then(r=>r.json()).then(geojson=>{
    geoLayer = L.geoJSON(geojson,{style:styleDistrict,onEachFeature:onEachFeature}).addTo(map);
    geoLayer.eachLayer(layer=>{
      var center = layer.getBounds().getCenter();
      L.marker(center,{icon:L.divIcon({className:'district-label',html:layer.feature.properties.adm2_name,iconAnchor:[0,0]})}).addTo(map);
    });
    updateLegend();
  });
}

// Style function with dynamic range
function styleDistrict(feature){
  var crop = cropSelect.value;
  var metric = metricSelect.value;
  var district = feature.properties.adm2_name?.trim().toLowerCase();
  var row = dataIndex[district]?.[crop];
  var value = row ? parseFloat(row[metric])||0 : 0;
  let ranges = computeRanges(metric);
  return {fillColor:getColorScale(value, ranges), weight:1, color:'white', fillOpacity:0.7};
}

// Tooltip & click
function onEachFeature(feature, layer){
  layer.on('mouseover', function(){
    var crop = cropSelect.value;
    var district = feature.properties.adm2_name?.trim().toLowerCase();
    var row = dataIndex[district]?.[crop];
    var html = row ? `
      <div style="font-size:13px; line-height:1.3; background-color:#ffdee1; padding:3px; border-radius:4px;">
        <strong>${row.District}</strong><br>
        Area: ${row['Cultivated area (Acres)']} Acre<br>
        Yield: ${row['Yield rate (m. ton) per acre']} ton/acre<br>
        Expenditure: ${row['Expenditure per acre in Tk.']} Tk<br>
        Price of produced crops: ${row['Price of produced crops per acre (Tk.)']} Tk<br>
        Price of by-products: ${row['Price of by- products per acre (Tk.)']} Tk<br>
        Profit: ${row['Profit per acre (Tk./acre)']} Tk<br>
        Total production: ${row['Total production (m. ton)']} ton<br>
        Crop share: ${row['Crop share (m. ton/acre)']} ton/acre
      </div>` : feature.properties.adm2_name;
    layer.bindTooltip(html,{sticky:true,direction:'auto',opacity:1}).openTooltip();
  });
  layer.on('mouseout',()=>layer.closeTooltip());

  layer.on('click', function(){
    if(selectedLayer) geoLayer.resetStyle(selectedLayer);
    layer.setStyle({color:'blue', weight:3, fillOpacity:0.8});
    layer.bringToFront();
    selectedLayer = layer;
  });
}

// Dropdown change updates
cropSelect.addEventListener('change',()=>{geoLayer.eachLayer(l=>l.setStyle(styleDistrict(l.feature))); updateLegend();});
metricSelect.addEventListener('change',()=>{geoLayer.eachLayer(l=>l.setStyle(styleDistrict(l.feature))); updateLegend();});

// Compute 5 ranges
function computeRanges(metric){
  let values=[];
  for(let district in dataIndex){
    let row = dataIndex[district][cropSelect.value];
    if(row && row[metric]) values.push(parseFloat(row[metric]));
  }
  if(values.length===0) return [0,0,0,0,0];
  let min=Math.min(...values), max=Math.max(...values);
  let step=(max-min)/5;
  return [min+step, min+2*step, min+3*step, min+4*step];
}

// Update legend
function updateLegend(){
  let metric = metricSelect.value;
  let ranges = computeRanges(metric);
  let colors = ['#FF0000','#FF4500','#FFA500','#FFFF00','#32CD32'];
  let labels = ['Very Low','Low','Moderate','High','Very High'];
  let legendHtml = `<div class="legend-title">Legend ${metric}</div>`;
  for(let i=0;i<5;i++){
    let rangeText = i===0?`${ranges[i].toFixed(0)}`:
                    i===4?`${ranges[i-1].toFixed(0)}-${ranges[i].toFixed(0)}`:
                    `${i===1?ranges[i-1].toFixed(0):ranges[i-1].toFixed(0)}-${ranges[i].toFixed(0)}`;
    legendHtml += `<div class="legend-item"><span class="legend-color" style="background:${colors[i]}"></span>${labels[i]} (${rangeText})</div>`;
  }
  document.getElementById('legend').innerHTML = legendHtml;
}
</script>
</body>
</html>

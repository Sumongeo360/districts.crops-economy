<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seasonal Crops Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:Arial;}

#topbar{
  position:absolute;top:0;width:100%;z-index:1000;
  background:#fff;padding:10px;text-align:center;
}

#dropdowns{margin-top:5px;display:flex;gap:8px;justify-content:center;}
#map{height:100%;width:100%;}

/* LABEL STYLE */
.label{
  font-family:"Times New Roman";
  font-size:12.5px;
  color:#000;
  text-shadow:1px 1px 2px #fff;
  white-space:nowrap;
}

/* POPUP */
.leaflet-popup-content-wrapper{background:#ffe6ea;}
.leaflet-popup-tip{background:#ffe6ea;}

/* FOOTER */
#footer{
  position:absolute;bottom:5px;width:100%;
  text-align:center;font-size:13px;
  background:rgba(255,255,255,0.85);
  z-index:1000;
}
</style>
</head>

<body>

<div id="topbar">
  <h2>Seasonal Crops Production, Expenditure, and Profit in Bangladesh</h2>
  <div id="dropdowns">
    <select id="cropSelect">
      <option>Local Boro</option>
      <option>Local Bona Aus</option>
      <option>Local Ropa Aman</option>
    </select>

    <select id="metricSelect">
      <option value="Cultivated area (Acres)">Cultivated Area</option>
      <option value="Yield rate (m. ton) per acre">Yield</option>
      <option value="Expenditure per acre in Tk.">Expenditure</option>
      <option value="Profit per acre (Tk./acre)">Profit</option>
      <option value="Total production (m. ton)">Production</option>
    </select>
  </div>
</div>

<div id="map"></div>

<div id="footer">
  Data Source:
  <a href="https://objectstorage.ap-dcc-gazipur-1.oraclecloud15.com/n/axvjbnqprylg/b/V2Ministry/o/office-bbs/2024/12/c303b53b29864763ae8cf174fdb57a44.pdf" target="_blank">
    Agriculture Sample Census 2020
  </a>
  |
  © <a href="https://www.linkedin.com/in/md-sumon-ali-992b91214/" target="_blank">Sumon</a>
</div>

<script>
// ---------------- MAP
var map = L.map('map',{zoomControl:false}).setView([23.7,90.4],6);
L.control.zoom({position:'bottomleft'}).addTo(map);

// Google map
var base = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
  subdomains:['mt0','mt1','mt2','mt3']
}).addTo(map);

var sat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{
  subdomains:['mt0','mt1','mt2','mt3']
});

L.control.layers({"Map":base,"Satellite":sat},null,{position:'topright'}).addTo(map);

// ---------------- DATA
var geoLayer, labels=L.layerGroup().addTo(map), dataIndex={};

Papa.parse("https://docs.google.com/spreadsheets/d/1lnnKF_oigj3TQl_N9BfIJJwviHktt3LzyW4UDMjHvxQ/gviz/tq?tqx=out:csv&gid=822582774",{
  download:true,header:true,
  complete:r=>{
    r.data.forEach(d=>{
      let dist=d.District?.toLowerCase();
      if(!dataIndex[dist]) dataIndex[dist]={};
      dataIndex[dist][d['Crops Name']]=d;
    });
    loadGeo();
  }
});

// ---------------- GEO
function loadGeo(){
  fetch('districts.geojson')
  .then(r=>r.json())
  .then(g=>{
    geoLayer=L.geoJSON(g,{
      style:styleFn,
      onEachFeature:onEach
    }).addTo(map);

    addLabels(geoLayer);
  });
}

// ---------------- COLOR
function getColor(v,arr){
  if(!arr.length) return '#ccc';
  return chroma.scale(['red','yellow','green'])
    .domain([Math.min(...arr),Math.max(...arr)])(v).hex();
}

function styleFn(f){
  let crop=cropSelect.value;
  let metric=metricSelect.value;
  let dist=f.properties.adm2_name.toLowerCase();

  let row=dataIndex[dist]?.[crop];
  let vals=Object.values(dataIndex)
    .map(d=>d[crop]?.[metric])
    .filter(v=>v).map(Number);

  let v=row?Number(row[metric]):0;

  return {fillColor:getColor(v,vals),color:'#fff',weight:1,fillOpacity:0.7};
}

// ---------------- POPUP
function onEach(f,l){
  l.on('click',e=>{
    let crop=cropSelect.value;
    let dist=f.properties.adm2_name.toLowerCase();
    let row=dataIndex[dist]?.[crop];

    let html=row?`
      <div style="font-family:'Times New Roman';font-size:13px;">
        <b>${row.District}</b><br><br>
        Area: ${row['Cultivated area (Acres)']} Acre<br>
        Yield: ${row['Yield rate (m. ton) per acre']} ton/acre<br>
        Expenditure: ${row['Expenditure per acre in Tk.']} Tk<br>
        Profit: ${row['Profit per acre (Tk./acre)']} Tk<br>
        Production: ${row['Total production (m. ton)']} ton
      </div>
    `:`No data`;

    L.popup().setLatLng(e.latlng).setContent(html).openOn(map);
  });
}

// ---------------- LABEL FIX (KEY PART)
function addLabels(layer){
  labels.clearLayers();

  layer.eachLayer(l=>{
    let center=l.getBounds().getCenter(); // 🔥 FIXED METHOD

    let name=l.feature.properties.adm2_name;

    L.marker(center,{
      icon:L.divIcon({
        className:'label',
        html:name
      })
    }).addTo(labels);
  });
}

// ---------------- UPDATE
cropSelect.onchange=update;
metricSelect.onchange=update;

function update(){
  geoLayer.eachLayer(l=>l.setStyle(styleFn(l.feature)));
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crops Dashboard</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
    /* ----------------- Embedded CSS ----------------- */
    body, html { 
        margin: 0; 
        height: 100%; 
        font-family: Arial, sans-serif; 
    }

    #map { 
        width: 100%; 
        height: 100%; 
    }

    /* Floating top bar */
    #topbar {
        position: absolute; 
        top: 10px; 
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        background: rgba(255,255,255,0.95); 
        padding: 10px 15px;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    #topbar h2 { 
        margin: 0 0 5px 0; 
        font-size: 18px; 
    }

    #dropdowns {
        display: flex;
        gap: 8px;
    }

    #dropdowns select { 
        padding: 5px; 
    }

    /* Info panel */
    #infoPanel {
        position: absolute; 
        bottom: 10px; 
        right: 10px; 
        z-index: 1000;
        background: rgba(255,255,255,0.95); 
        padding: 10px; 
        border-radius: 6px;
        width: 230px; 
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    </style>
</head>

<body>

<!-- Floating Control -->
<div id="topbar">
    <h2>Crops Dashboard</h2>
    <div id="dropdowns">
        <select id="cropSelect">
            <option>Local Boro</option>
            <option>Local Bona Aus</option>
            <option>Local Ropa Aman</option>
        </select>

        <select id="metricSelect">
            <option value="Total production (m. ton)">Total Production</option>
            <option value="Profit per acre (Tk./acre)">Profit per Acre</option>
            <option value="Crop share (m. ton/acre)">Crop Share</option>
        </select>
    </div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Info Panel -->
<div id="infoPanel">
    <h3>District Info</h3>
    <div id="districtInfo">Click a district</div>
</div>

<!-- Leaflet & Tabletop JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tabletop@1.6.0/src/tabletop.min.js"></script>

<script>
/* ----------------- Embedded JS ----------------- */

// Map init
var map = L.map('map', { zoomControl: false }).setView([23.7, 90.4], 6);

// Zoom control bottom-left
L.control.zoom({ position: 'bottomleft' }).addTo(map);

// Base maps
var baseMap = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '&copy; OpenStreetMap contributors' }
).addTo(map);

var satelliteMap = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: 'Tiles &copy; ESRI' }
);

// Layer control
L.control.layers({ "Base Map": baseMap, "Satellite": satelliteMap }, null, { position: 'topright' }).addTo(map);

// Globals
var geojsonLayer;
var dataIndex = {};

// Load GeoJSON
fetch('./districts.geojson')
.then(res => res.json())
.then(geojson => {

    // Load Google Sheet
    Tabletop.init({
        key: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSuwjF5JH4d3cPJLqM5H-W5AoHhHzhu24Z_lSzB43YMoOK-j3M1U-D-3YLt0525RsMOrTl3GPDOQS2f/pubhtml?gid=822582774&single=true',
        simpleSheet: true,
        callback: function(data) {

            // Build lookup
            data.forEach(d => {
                var district = d.District?.trim().toLowerCase();
                var crop = d['Crops Name'];
                if (!dataIndex[district]) dataIndex[district] = {};
                dataIndex[district][crop] = d;
            });

            // Add map layer
            geojsonLayer = L.geoJSON(geojson, {
                style: styleDistrict,
                onEachFeature: onEachFeature
            }).addTo(map);
        }
    });
});

// Color scale
function getColor(v) {
    return v > 1000 ? '#084081' :
           v > 500  ? '#0868ac' :
           v > 200  ? '#2b8cbe' :
           v > 100  ? '#4eb3d3' :
           v > 50   ? '#7bccc4' :
           v > 20   ? '#a8ddb5' :
                      '#ccebc5';
}

// Style districts
function styleDistrict(feature) {
    var crop = document.getElementById('cropSelect').value;
    var metric = document.getElementById('metricSelect').value;
    var district = feature.properties.adm2_name?.trim().toLowerCase();
    var row = dataIndex[district]?.[crop];
    var value = row ? parseFloat(row[metric]) || 0 : 0;
    return {
        fillColor: getColor(value),
        weight: 1,
        color: 'white',
        fillOpacity: 0.7
    };
}

// Click info
function onEachFeature(feature, layer) {
    layer.on('click', function() {
        var crop = document.getElementById('cropSelect').value;
        var district = feature.properties.adm2_name?.trim().toLowerCase();
        var row = dataIndex[district]?.[crop];
        if(row){
            document.getElementById('districtInfo').innerHTML = `
                <b>${row.District}</b><br>
                Area: ${row['Cultivated area (Acres)']} Acres<br>
                Yield: ${row['Yield rate (m. ton) per acre']}<br>
                Profit: Tk. ${row['Profit per acre (Tk./acre)']}<br>
                Production: ${row['Total production (m. ton)']}
            `;
        } else {
            document.getElementById('districtInfo').innerHTML =
                `<b>${feature.properties.adm2_name}</b><br>No data`;
        }
    });
}

// Update map when dropdown changes
document.getElementById('cropSelect').addEventListener('change', updateMap);
document.getElementById('metricSelect').addEventListener('change', updateMap);

function updateMap() {
    geojsonLayer.eachLayer(layer => {
        layer.setStyle(styleDistrict(layer.feature));
    });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crops Dashboard</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-providers/leaflet-providers.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html,body{margin:0;padding:0;height:100%;font-family:Arial,sans-serif;}
#topContainer{
  width:100%;position:absolute;top:0;left:0;z-index:1000;
  display:flex;flex-direction:column;align-items:center;
  background:rgba(255,255,255,0.95);box-shadow:0 2px 6px rgba(0,0,0,0.3);
}
#titleRow{
  width:100%;text-align:center;padding:10px 0;background:#d32f2f;color:#fff;font-size:20px;font-weight:bold;
}
#filterRow{
  display:flex;gap:8px;padding:6px 10px 10px 10px;
  flex-wrap:wrap;justify-content:center;
}
#filterRow select{padding:5px;font-size:14px;}
#map{position:absolute;top:90px;bottom:0;left:0;right:0;}
.leaflet-label{
  font-weight:bold;color:#000;background:none;border:none;text-shadow:1px 1px 2px #fff;font-size:12px;
}
</style>
</head>

<body>

<div id="topContainer">
  <div id="titleRow">Crops Dashboard</div>
  <div id="filterRow">
    <select id="cropSelect">
      <option>Local Boro</option>
      <option>Local Bona Aus</option>
      <option>Local Ropa Aman</option>
    </select>
    <select id="metricSelect">
      <option value="Total production (m. ton)">Total Production</option>
      <option value="Profit per acre (Tk./acre)">Profit per Acre</option>
      <option value="Crop share (m. ton/acre)">Crop Share</option>
    </select>
  </div>
</div>

<div id="map"></div>

<script>
// Initialize map
var map = L.map('map', { zoomControl: true }).setView([23.7, 90.4], 6);

// Base layers
var satelliteMap = L.tileLayer.provider('Esri.WorldImagery').addTo(map);
var baseMap = L.tileLayer.provider('OpenStreetMap.Mapnik');
L.control.layers({ "Satellite": satelliteMap, "Base": baseMap }, null, { position:'topright' }).addTo(map);

// Globals
var geojsonLayer, dataIndex = {};
const CSV_URL = "https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/gviz/tq?tqx=out:csv&gid=822582774";

// Load CSV
Papa.parse(CSV_URL,{
  download:true, header:true, skipEmptyLines:true,
  complete:function(results){
    results.data.forEach(d => {
      const district = d.District?.trim().toLowerCase();
      const crop = d['Crops Name'];
      if(!dataIndex[district]) dataIndex[district]={};
      dataIndex[district][crop] = d;
    });
    loadGeoJSON();
  }
});

// Load GeoJSON
function loadGeoJSON(){
  fetch('districts.geojson')
    .then(r => r.json())
    .then(geojson => {
      geojsonLayer = L.geoJSON(geojson, {
        style: styleDistrict,
        onEachFeature: onEachFeature
      }).addTo(map);

      // Add labels
      geojsonLayer.eachLayer(layer=>{
        const center = layer.getBounds().getCenter();
        L.marker(center,{icon:L.divIcon({
          className:'leaflet-label',
          html: layer.feature.properties.adm2_name
        })}).addTo(map);
      });
    });
}

// Calculate percentile color
function getPercentileColor(value, allValues){
  allValues.sort((a,b)=>a-b);
  const idx = allValues.findIndex(v=>v>=value);
  const perc = idx/allValues.length;
  const r = Math.floor(255*(1-perc));
  const g = Math.floor(255*perc);
  return `rgb(${r},${g},0)`;
}

// Style districts
function styleDistrict(feature){
  const crop = document.getElementById('cropSelect').value;
  const metric = document.getElementById('metricSelect').value;
  const district = feature.properties.adm2_name?.trim().toLowerCase();
  const row = dataIndex[district]?.[crop];
  let value = row ? parseFloat(row[metric])||0 : 0;

  const allValues = Object.values(dataIndex).map(d=>d[crop]?parseFloat(d[crop][metric]||0):0);
  const fillColor = getPercentileColor(value, allValues);

  return { fillColor: fillColor, weight:1, color:'white', fillOpacity:0.7 };
}

// Tooltip
function onEachFeature(feature, layer){
  layer.on('mouseover', e=>{
    const crop = document.getElementById('cropSelect').value;
    const district = feature.properties.adm2_name?.trim().toLowerCase();
    const row = dataIndex[district]?.[crop];
    let content = `<b>${feature.properties.adm2_name}</b><br>No data`;
    if(row){
      content=`<b>${row.District}</b><br>
      Area: ${row['Cultivated area (Acres)']} Acres<br>
      Yield: ${row['Yield rate (m. ton) per acre']}<br>
      Profit: Tk. ${row['Profit per acre (Tk./acre)']}<br>
      Production: ${row['Total production (m. ton)']}`;
    }
    layer.bindTooltip(content,{sticky:true}).openTooltip();
  });
}

// Update map when dropdown changes
document.getElementById('cropSelect').addEventListener('change', updateMap);
document.getElementById('metricSelect').addEventListener('change', updateMap);

function updateMap(){
  if(!geojsonLayer) return;
  geojsonLayer.eachLayer(layer=>layer.setStyle(styleDistrict(layer.feature)));
}
</script>

</body>
</html>

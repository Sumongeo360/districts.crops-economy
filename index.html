<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Seasonal Crops Production, Expenditure and Profit in Bangladesh</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-providers/leaflet-providers.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
html, body {margin:0; padding:0; height:100%; font-family:'Times New Roman', serif;}
#row1 {height:10%; display:flex; flex-direction:column; justify-content:center; align-items:center;}
#title {color:red; font-size:22px; margin-bottom:4px;}
#dropdowns {display:flex; gap:8px; font-family:'Times New Roman';}
#dropdowns select {color:blue; padding:4px; font-family:'Times New Roman';}
#row2 {height:88%; position:relative;}
#map {position:absolute; top:0; bottom:0; left:0; right:0;}
#row3 {height:2%; display:flex; justify-content:center; align-items:center; font-size:12px;}
.labelLayer {font-family:'Times New Roman'; font-size:12.5px; pointer-events:none; text-align:center;}
</style>
</head>
<body>

<div id="row1">
  <div id="title">Seasonal Crops Production, Expenditure and Profit in Bangladesh</div>
  <div id="dropdowns">
    <select id="cropSelect">
      <option>Local Boro</option>
      <option>Local Bona Aus</option>
      <option>Local Ropa Aman</option>
    </select>
    <select id="metricSelect">
      <option value="Cultivated area (Acres)">Cultivated area (Acres)</option>
      <option value="Yield rate (m. ton) per acre">Yield rate (m. ton) per acre</option>
      <option value="Expenditure per acre in Tk.">Expenditure per acre in Tk.</option>
      <option value="Price of produced crops per acre (Tk.)">Price of produced crops per acre (Tk.)</option>
      <option value="Price of by- products per acre (Tk.)">Price of by-products per acre (Tk.)</option>
      <option value="Profit per acre (Tk./acre)">Profit per acre (Tk./acre)</option>
      <option value="Total production (m. ton)">Total production (m. ton)</option>
      <option value="Crop share (m. ton/acre)">Crop share (m. ton/acre)</option>
    </select>
  </div>
</div>

<div id="row2">
  <div id="map"></div>
</div>

<div id="row3">
  <span>Data Source: <a href="https://objectstorage.ap-dcc-gazipur-1.oraclecloud15.com/n/axvjbnqprylg/b/V2Ministry/o/office-bbs/2024/12/c303b53b29864763ae8cf174fdb57a44.pdf" target="_blank">Agriculture Sample Census-2020</a> | © <a href="https://www.linkedin.com/in/md-sumon-ali-992b91214/" target="_blank">Sumon</a></span>
</div>

<script>
var map = L.map('map', {zoomControl:false}).setView([23.7,90.4],6);

// Zoom control top-left
L.control.zoom({position:'topleft'}).addTo(map);

// Base & Satellite layers top-right
var baseLayer = L.tileLayer.provider('Google.Normal.Map').addTo(map);
var satLayer = L.tileLayer.provider('Esri.WorldImagery');
L.control.layers({Base: baseLayer, Satellite: satLayer}, null, {position:'topright'}).addTo(map);

// Globals
var geoLayer, dataIndex={}, labelLayer = L.layerGroup().addTo(map), selectedLayer=null;
var CSV_URL = "https://docs.google.com/spreadsheets/d/1lnnKF_oigj3TQl_N9BfIJJwviHktt3LzyW4UDMjHvxQ/gviz/tq?tqx=out:csv&gid=822582774";
var cropSelect = document.getElementById('cropSelect');
var metricSelect = document.getElementById('metricSelect');

// Load CSV
Papa.parse(CSV_URL,{
  download:true, header:true, skipEmptyLines:true,
  complete:function(results){
    results.data.forEach(d=>{
      var district = d.District?.trim().toLowerCase();
      var crop = d['Crops Name'];
      if(!dataIndex[district]) dataIndex[district]={};
      dataIndex[district][crop] = d;
    });
    loadGeoJSON();
  }
});

// Load GeoJSON
function loadGeoJSON(){
  fetch('districts.geojson')
  .then(r=>r.json())
  .then(geojson=>{
    geoLayer = L.geoJSON(geojson,{
      style: styleDistrict,
      onEachFeature: onEachFeature
    }).addTo(map);
    map.fitBounds(geoLayer.getBounds());
    setTimeout(()=>map.invalidateSize(),100);
    addLabels();
  });
}

// Color scale (green→red)
function getColor(value){
  if(value===0) return '#ccebc5';
  if(value<=20) return '#a8ddb5';
  if(value<=50) return '#7bccc4';
  if(value<=100) return '#4eb3d3';
  if(value<=200) return '#2b8cbe';
  if(value<=500) return '#0868ac';
  return '#084081';
}

// Style districts
function styleDistrict(feature){
  var crop = cropSelect.value;
  var metric = metricSelect.value;
  var district = feature.properties.adm2_name?.trim().toLowerCase();
  var row = dataIndex[district]?.[crop];
  var value = row ? parseFloat(row[metric]) || 0 : 0;
  return {fillColor: getColor(value), weight:1, color:'white', fillOpacity:0.7};
}

// Tooltip & selection
function onEachFeature(feature, layer){
  layer.on('mouseover', function(e){
    var crop = cropSelect.value;
    var district = feature.properties.adm2_name?.trim().toLowerCase();
    var row = dataIndex[district]?.[crop];
    var html = row ? `
      <div style="font-size:13px; line-height:1.2; background-color:#ffdee1; padding:4px; border-radius:4px;">
        ${row.District} Area: ${row['Cultivated area (Acres)']} Acre
        Yield: ${row['Yield rate (m. ton) per acre']} ton/acre
        Expenditure: ${row['Expenditure per acre in Tk.']} Tk
        Profit: ${row['Profit per acre (Tk./acre)']} Tk
        Production: ${row['Total production (m. ton)']} ton
      </div>` : feature.properties.adm2_name;

    layer.bindTooltip(html, {direction:'auto', sticky:true, opacity:0.95}).openTooltip();
  });

  layer.on('mouseout', function(){layer.closeTooltip();});

  layer.on('click', function(){
    if(selectedLayer) geoLayer.resetStyle(selectedLayer);
    layer.setStyle({color:'red', weight:3, fillOpacity:0.8});
    layer.bringToFront();
    selectedLayer = layer;
  });
}

// Labels inside polygons
function addLabels(){
  labelLayer.clearLayers();
  geoLayer.eachLayer(layer=>{
    var center = layer.getBounds().getCenter();
    var label = L.divIcon({className:'labelLayer', html:layer.feature.properties.adm2_name, iconAnchor:[0,0]});
    L.marker(center,{icon:label}).addTo(labelLayer);
  });
}

// Update on dropdown change
cropSelect.addEventListener('change',()=>{
  geoLayer.eachLayer(layer=>layer.setStyle(styleDistrict(layer.feature)));
});
metricSelect.addEventListener('change',()=>{
  geoLayer.eachLayer(layer=>layer.setStyle(styleDistrict(layer.feature)));
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Seasonal Crops Production Expenditure and Profit in Bangladesh</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-providers/leaflet-providers.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Times New Roman', serif;
    }

    #topbar {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(255,255,255,0.95);
      text-align: center;
      padding: 5px 5px;
      height: auto;
    }

    #topbar h2 {
      margin: 0;
      font-size: 22px;
      color: red;
    }

    #dropdowns {
      margin-top: 3px;
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    #dropdowns select {
      font-family: 'Times New Roman';
      font-size: 18px;
      color: blue;
      padding: 3px;
    }

    #mapContainer {
      height: 88%;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    #sourceCredit {
      height: 2%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 12px;
      text-align: center;
    }

    .district-label {
      font-family: 'Times New Roman';
      font-size: 12.5px;
      text-align: center;
      pointer-events: none;
    }

    .legend {
      position: absolute;
      bottom: 15px;
      left: 15px;
      background: white;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.2;
      box-shadow: 0 0 4px rgba(0,0,0,0.3);
      z-index: 1000;
      max-width: 350px;
      min-width: 120px;
    }

    .legend-title {
      font-weight: bold;
      margin-bottom: 2px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .legend-color {
      width: 20px;
      height: 20px;
      display: inline-block;
    }
  </style>
</head>

<body>

  <div id="topbar">
    <h2>Seasonal Crops Production Expenditure and Profit in Bangladesh</h2>
    <div id="dropdowns">
      <select id="cropSelect"></select>
      <select id="metricSelect"></select>
    </div>
  </div>

  <div id="mapContainer">
    <div id="map"></div>
    <div class="north-arrow"></div>
    <div id="legend" class="legend"></div>
  </div>

  <div id="sourceCredit">
    Data source:
    <a href="https://objectstorage.ap-dcc-gazipur-1.oraclecloud15.com/n/axvjbnqprylg/b/V2Ministry/o/office-bbs/2024/12/c303b53b29864763ae8cf174fdb57a44.pdf" target="_blank">
      Agriculture Sample Census-2020
    </a>
    |
    ©
    <a href="https://www.linkedin.com/in/md-sumon-ali-992b91214/" target="_blank">
      Sumon
    </a>
  </div>

  <script>
    var map = L.map('map', { zoomControl: true });

    // Base & Satellite layers
    var baseLayer = L.tileLayer(
      'https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',
      { subdomains: ['mt0','mt1','mt2','mt3'] }
    ).addTo(map);

    var satelliteLayer = L.tileLayer(
      'https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
      { subdomains: ['mt0','mt1','mt2','mt3'] }
    );

    L.control.layers(
      { "Base Map": baseLayer, "Satellite": satelliteLayer },
      {},
      { position: 'topright' }
    ).addTo(map);

    var geoLayer, dataIndex = {}, selectedLayer = null;

    const cropSelect = document.getElementById('cropSelect');
    const metricSelect = document.getElementById('metricSelect');

    const metrics = [
      "Cultivated area (Acres)",
      "Yield rate (m. ton) per acre",
      "Expenditure per acre in Tk.",
      "Price of produced crops per acre (Tk.)",
      "Price of by- products per acre (Tk.)",
      "Profit per acre (Tk./acre)",
      "Total production (m. ton)",
      "Crop share (m. ton/acre)"
    ];

    metrics.forEach(m => {
      metricSelect.innerHTML += `<option value="${m}">${m}</option>`;
    });

    // Color scale helper
    function getColorScale(value, breaks) {
      if (value <= breaks[0]) return '#FF0000';
      else if (value <= breaks[1]) return '#FF4500';
      else if (value <= breaks[2]) return '#FFA500';
      else if (value <= breaks[3]) return '#FFFF00';
      else return '#32CD32';
    }

    // Load nested JSON
    fetch('./Crops_Dashboard.json')
      .then(res => res.json())
      .then(data => {
        dataIndex = data;

        let cropsSet = new Set();
        for (let d in data) {
          for (let crop in data[d]) {
            cropsSet.add(crop);
          }
        }

        let crops = Array.from(cropsSet).sort();
        cropSelect.innerHTML = crops.map(c => `<option>${c}</option>`).join('');

        loadGeoJSON();
      });

    // Load GeoJSON and fit map
    function loadGeoJSON() {
      fetch('districts.geojson')
        .then(r => r.json())
        .then(geojson => {

          geoLayer = L.geoJSON(geojson, {
            style: styleDistrict,
            onEachFeature: onEachFeature
          }).addTo(map);

          map.fitBounds(geoLayer.getBounds());

          geoLayer.eachLayer(layer => {
            var center = layer.getBounds().getCenter();

            L.marker(center, {
              icon: L.divIcon({
                className: 'district-label',
                html: layer.feature.properties.adm2_name,
                iconAnchor: [0, 0]
              })
            }).addTo(map);
          });

          updateLegend();
        });
    }

    // Style polygons
    function styleDistrict(feature) {
      var crop = cropSelect.value;
      var metric = metricSelect.value;

      var district = feature.properties.adm2_name?.trim().toLowerCase();
      var row = dataIndex[district]?.[crop];

      var value = row ? parseFloat(row[metric]) || 0 : 0;
      let breaks = computeBreaks(metric);

      return {
        fillColor: getColorScale(value, breaks),
        weight: 1,
        color: 'white',
        fillOpacity: 0.7
      };
    }

    // Tooltip & click
    function onEachFeature(feature, layer) {

      layer.on('mouseover', function() {
        var crop = cropSelect.value;
        var districtKey = feature.properties.adm2_name?.trim().toLowerCase();
        var row = dataIndex[districtKey]?.[crop];

        var districtName = feature.properties.adm2_name;

        var html = row ? `
          <div style="font-size:13px; line-height:1.3; background-color:#ffdee1; padding:3px; border-radius:4px;">
            <strong>${districtName}</strong><br>
            Cultivated area: ${row['Cultivated area (Acres)']} Acre<br>
            Yield: ${row['Yield rate (m. ton) per acre']} ton/acre<br>
            Expenditure: ${row['Expenditure per acre in Tk.']} Tk<br>
            Price of produced crops: ${row['Price of produced crops per acre (Tk.)']} Tk<br>
            Price of by-products: ${row['Price of by- products per acre (Tk.)']} Tk<br>
            Profit: ${row['Profit per acre (Tk./acre)']} Tk<br>
            Total production: ${row['Total production (m. ton)']} ton<br>
          </div>
        ` : districtName;

        layer.bindTooltip(html, {
          sticky: true,
          direction: 'auto',
          opacity: 1
        }).openTooltip();
      });

      layer.on('mouseout', () => layer.closeTooltip());

      layer.on('click', function() {
        if (selectedLayer) geoLayer.resetStyle(selectedLayer);

        layer.setStyle({
          color: 'blue',
          weight: 3,
          fillOpacity: 0.8
        });

        layer.bringToFront();
        selectedLayer = layer;
      });
    }

    // Dropdown change
    cropSelect.addEventListener('change', () => {
      geoLayer.eachLayer(l => l.setStyle(styleDistrict(l.feature)));
      updateLegend();
    });

    metricSelect.addEventListener('change', () => {
      geoLayer.eachLayer(l => l.setStyle(styleDistrict(l.feature)));
      updateLegend();
    });

    // Compute breaks dynamically
    function computeBreaks(metric) {
      let vals = [];

      for (let d in dataIndex) {
        let row = dataIndex[d][cropSelect.value];
        if (row && row[metric]) vals.push(parseFloat(row[metric]));
      }

      if (vals.length === 0) return [0,0,0,0];

      let min = Math.min(...vals);
      let max = Math.max(...vals);
      let step = (max - min) / 5;

      return [
        min + step,
        min + 2 * step,
        min + 3 * step,
        min + 4 * step
      ];
    }

    // Update legend
    function updateLegend() {
      let metric = metricSelect.value;
      let breaks = computeBreaks(metric);

      let colors = ['#FF0000','#FF4500','#FFA500','#FFFF00','#32CD32'];
      let labels = ['Very Low','Low','Moderate','High','Very High'];

      let html = `<div class="legend-title">${metric}</div>`;

      for (let i = 0; i < 5; i++) {
        let rangeText =
          i === 0
            ? `0-${breaks[0].toFixed(0)}`
            : i === 4
              ? `${breaks[3].toFixed(0)}-${(breaks[3] + (breaks[3] - breaks[2])).toFixed(0)}`
              : `${breaks[i-1].toFixed(0)}-${breaks[i].toFixed(0)}`;

        html += `
          <div class="legend-item">
            <span class="legend-color" style="background:${colors[i]}"></span>
            ${labels[i]} (${rangeText})
          </div>
        `;
      }

      document.getElementById('legend').innerHTML = html;
    }
  </script>

</body>
</html>
